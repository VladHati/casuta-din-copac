<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Platforma 3D — Casuta din copac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F4F1EA;--ink:#26241F;--soft:#5C574E;--faint:#938D80;--line:#E2DACB;--acc:#C2693A;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:24px 20px 50px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(26px,4vw,38px);margin:0 0 4px;letter-spacing:-.01em}
.lead{color:var(--soft);margin:0 0 18px;font-size:15px}
.stage{position:relative;width:100%;height:min(74vh,600px);background:linear-gradient(#FBFAF6,#EFEBE1);
  border:1px solid var(--line);border-radius:18px;overflow:hidden;touch-action:none}
#cv{display:block;width:100%;height:100%}
.hint{position:absolute;left:14px;bottom:12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--soft);
  background:rgba(255,255,255,.75);border:1px solid var(--line);border-radius:8px;padding:5px 9px}
.layers{position:absolute;right:14px;top:14px;background:rgba(255,255,255,.92);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;font-size:12.5px;max-height:86%;overflow:auto;backdrop-filter:blur(4px)}
.layers h3{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 0 8px}
.layers label{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;white-space:nowrap}
.layers .sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.2);flex:0 0 auto}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.btn{font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;border:1px solid var(--line);
  background:#fff;color:var(--ink);border-radius:999px;padding:8px 15px;transition:.15s}
.btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
@media(max-width:620px){.layers{font-size:11px;padding:8px 9px;right:8px;top:8px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Platforma in 3D</h1>
  <p class="lead">Stalpii, grinzile, joistele, podeaua si intaririle — la scara. Trage = roteste, scroll/pinch = zoom. Aprinde si stinge layerele din dreapta ca sa vezi fiecare strat.</p>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="layers"><h3>Layere</h3><div id="layerList"></div></div>
    <div class="hint">trage = roteste · scroll = zoom</div>
  </div>

  <div class="controls">
    <button class="btn" data-v="3d">Vedere 3D</button>
    <button class="btn" data-v="fata">Din fata</button>
    <button class="btn" data-v="lat">Din lateral</button>
    <button class="btn" data-v="sus">De sus</button>
    <button class="btn" id="reset">Reset</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const cv=document.getElementById('cv'), stage=cv.parentElement;
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,1,0.1,100);
  scene.add(new THREE.HemisphereLight(0xffffff,0xb7ad97,1.0));
  const d1=new THREE.DirectionalLight(0xffffff,0.55); d1.position.set(4,7,5); scene.add(d1);
  const d2=new THREE.DirectionalLight(0xffffff,0.2); d2.position.set(-5,3,-4); scene.add(d2);

  const root=new THREE.Group(); scene.add(root);
  const edgeMat=new THREE.LineBasicMaterial({color:0x3a342b,transparent:true,opacity:0.35});
  const boltMat=new THREE.MeshStandardMaterial({color:0x2b2620,roughness:0.6,metalness:0.3});
  function mat(c){return new THREE.MeshStandardMaterial({color:c,roughness:0.85,metalness:0});}

  // layer groups
  const G={};
  ['ground','posts','beams','joists','deck','braces','fix','rail','tree','dims','labels'].forEach(k=>{G[k]=new THREE.Group();root.add(G[k]);});

  function box(w,h,d,material,x,y,z,group){
    const g=new THREE.BoxGeometry(w,h,d);
    const m=new THREE.Mesh(g,material); m.position.set(x,y,z); group.add(m);
    const e=new THREE.LineSegments(new THREE.EdgesGeometry(g),edgeMat); e.position.set(x,y,z); group.add(e);
    return m;
  }
  function sbox(w,h,d,material,x,y,z,group){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);m.position.set(x,y,z);group.add(m);return m;}
  function strutBox(ax,ay,az,bx,by,bz,sec,material,group){
    const a=new THREE.Vector3(ax,ay,az), b=new THREE.Vector3(bx,by,bz);
    const dir=new THREE.Vector3().subVectors(b,a); const len=dir.length();
    const m=new THREE.Mesh(new THREE.BoxGeometry(sec,len,sec),material);
    m.position.copy(a).addScaledVector(dir,0.5);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
    group.add(m);
    [a,b].forEach(p=>{const j=new THREE.Mesh(new THREE.SphereGeometry(0.04,12,12),boltMat);j.position.copy(p);group.add(j);});
  }
  function label(text,x,y,z,group,color){
    const c=document.createElement('canvas');c.width=256;c.height=128;const ctx=c.getContext('2d');
    ctx.fillStyle='rgba(255,255,255,0.92)';rr(ctx,8,36,240,56,14);ctx.fill();
    ctx.strokeStyle=color||'#26241F';ctx.lineWidth=3;rr(ctx,8,36,240,56,14);ctx.stroke();
    ctx.fillStyle=color||'#26241F';ctx.font='bold 40px "Space Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,128,66);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false}));
    sp.position.set(x,y,z);sp.scale.set(0.74,0.37,1);group.add(sp);
  }
  function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

  // === materiale ===
  const M={backPost:mat(0xB98A55),frontPost:mat(0xE0C293),beam:mat(0x9C6A3F),joist:mat(0xD2A875),
    deck:mat(0xE0CDA6),brace:mat(0xA8623A),clip:mat(0x6f6f6f),rail:mat(0xCBA372),trunk:mat(0x7A5A3C)};

  // === geometrie (m) ===
  const W=2.1,D=1.78,FLOOR=2.2,PS=0.1;
  const deckThk=0.028,jH=0.1,beamH=0.20,beamD=0.09;
  const beamTop=FLOOR-deckThk-jH, beamCy=beamTop-beamH/2, jCy=beamTop+jH/2;
  const frontPostH=beamTop-beamH;
  const backBeamZ=D-(PS/2+beamD/2), frontBeamZ=0;
  const jBack=D-PS/2, jFront=-0.7, jCz=(jBack+jFront)/2;
  const jx=[0.12,0.55,0.98,1.38,1.82,2.0]; // copac la x=1.6 cade intre 1.38 si 1.82
  const wallZ=D-1.1, RTOP=FLOOR+1.0;
  const tableY=FLOOR+0.58;

  // ground + anchors
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(9,9),new THREE.MeshStandardMaterial({color:0xE3E1D2,roughness:1}));
  ground.rotation.x=-Math.PI/2; G.ground.add(ground);
  [[0,0],[W,0],[0,D],[W,D]].forEach(p=>box(0.16,0.2,0.16,M.clip,p[0],-0.06,p[1],G.ground));

  // posts
  box(PS,3.7,PS,M.backPost,0,3.7/2,D,G.posts);
  box(PS,3.7,PS,M.backPost,W,3.7/2,D,G.posts);
  box(PS,frontPostH,PS,M.frontPost,W,frontPostH/2,0,G.posts);
  box(PS,frontPostH,PS,M.frontPost,0,frontPostH/2,0,G.posts);

  // beams glulam 90x200: fata PE varful stalpilor; spate pe POLITA din lemn + buloane M12
  box(W+0.16,beamH,beamD,M.beam,W/2,beamCy,backBeamZ,G.beams);
  box(W+0.16,beamH,beamD,M.beam,W/2,beamCy,frontBeamZ,G.beams);
  // polita lemn sub grinda spate + 2 buloane M12, la fiecare stalp spate
  [0,W].forEach(px=>{
    box(0.12,0.10,0.10,M.beam,px,beamCy-beamH/2-0.05,backBeamZ,G.beams);
    box(0.024,0.024,0.13,M.clip,px,beamCy-beamH/2-0.028,backBeamZ+0.01,G.beams);
    box(0.024,0.024,0.13,M.clip,px,beamCy-beamH/2-0.072,backBeamZ+0.01,G.beams);
  });

  // joists + headers gaura copac
  const jLen=jBack-jFront;
  jx.forEach(x=>box(0.1,jH,jLen,M.joist,x,jCy,jCz,G.joists));
  box(0.34,jH,0.06,M.joist,1.6,jCy,-0.05,G.joists);
  box(0.34,jH,0.06,M.joist,1.6,jCy,-0.35,G.joists);

  // === podea: scanduri reale, cu gaura pt copac ===
  const deckY=FLOOR-deckThk/2, pw=0.12, pitch=0.14;
  const holeX=[0.35,0.65], holeZ=[-0.36,-0.04];
  for(let z=jFront+0.07; z<=jBack-0.02; z+=pitch){
    if(z>holeZ[0] && z<holeZ[1]){
      sbox(holeX[0]-0, deckThk, pw, M.deck, holeX[0]/2, deckY, z, G.deck);
      sbox(W-holeX[1], deckThk, pw, M.deck, (W+holeX[1])/2, deckY, z, G.deck);
    } else {
      sbox(W, deckThk, pw, M.deck, W/2, deckY, z, G.deck);
    }
  }

  // === contravantuiri (sectiune patrata 80x80 + buloane la capete) ===
  // lateral stanga/dreapta (anti-balans fata-spate): back-post jos -> sub grinda fata
  strutBox(0,1.05,jBack, 0,beamCy-beamH/2,0.05, 0.08, M.brace, G.braces);
  strutBox(W,1.05,jBack, W,beamCy-beamH/2,0.05, 0.08, M.brace, G.braces);
  // plan fata (balcon deschis): doua diagonale in V sub grinda fata
  strutBox(0.05,1.05,0, 0.95,beamCy-beamH/2,0, 0.08, M.brace, G.braces);
  strutBox(W-0.05,1.05,0, W-0.95,beamCy-beamH/2,0, 0.08, M.brace, G.braces);
  // contrafise sub nasul consolei
  strutBox(0,1.10,0.05, 0,jCy-0.06,-0.55, 0.07, M.brace, G.braces);
  strutBox(W,1.10,0.05, W,jCy-0.06,-0.55, 0.07, M.brace, G.braces);

  // === intariri: ancorare joiste (anti-ridicare) + blocaje ===
  jx.forEach(x=>sbox(0.045,0.13,0.05,M.clip,x+0.062,jCy-0.01,backBeamZ,G.fix));
  for(let i=0;i<jx.length-1;i++){const cx=(jx[i]+jx[i+1])/2,bw=(jx[i+1]-jx[i])-0.1;
    sbox(bw,jH,0.08,M.joist,cx,jCy,backBeamZ,G.fix);
    sbox(bw,jH,0.08,M.joist,cx,jCy,frontBeamZ,G.fix);}

  // === balustrada 1000 + poarta la scara (S4) ===
  const infillMat=new THREE.MeshStandardMaterial({color:0xE9DCC4,roughness:0.9,transparent:true,opacity:0.32});
  function railSeg(x1,z1,x2,z2){
    const mx=(x1+x2)/2,mz=(z1+z2)/2,lx=Math.abs(x2-x1),lz=Math.abs(z2-z1),h=lx>lz;
    sbox(h?lx+0.06:0.06,0.06,h?0.06:lz+0.06,M.rail,mx,RTOP,mz,G.rail);
    sbox(h?lx:0.02,0.94,h?0.02:lz,infillMat,mx,FLOOR+0.49,mz,G.rail);
    sbox(0.06,1.0,0.06,M.rail,x1,FLOOR+0.5,z1,G.rail);
    sbox(0.06,1.0,0.06,M.rail,x2,FLOOR+0.5,z2,G.rail);
  }
  railSeg(0,-0.7,W,-0.7);     // fata
  railSeg(W,-0.7,W,wallZ);    // dreapta (plina) — aici e copacul
  railSeg(0,-0.7,0,-0.05);    // stanga, pana la poarta
  railSeg(0,0.30,0,wallZ);    // stanga, dupa poarta
  label('poarta',-0.16,RTOP+0.04,0.12,G.rail,'#C2693A');
  label('balustrada 1000',W/2,RTOP+0.12,-0.74,G.rail,'#5C574E');

  // === copac + masa ===
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.09,tableY,18),M.trunk);
  trunk.position.set(1.6,tableY/2,-0.2); G.tree.add(trunk);
  const tdisc=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.26,0.03,24),mat(0xCDA877));
  tdisc.position.set(1.6,tableY+0.015,-0.2); G.tree.add(tdisc);
  label('copac',1.6,tableY+0.2,-0.2,G.tree,'#7A5A3C');

  // === etichete fixe ===
  label('S1',-0.18,3.5,D,G.labels);
  label('S2',W+0.18,3.5,D,G.labels);
  label('S3',W+0.2,1.25,0,G.labels);
  label('S4',-0.2,1.25,0,G.labels);
  label('fata',W/2,0.32,-0.82,G.labels,'#C2693A');
  label('spate / gard',W/2,0.32,D+0.22,G.labels,'#5C574E');

  // === cote (dims) ===
  label('2100',W/2,-0.05,-0.92,G.dims,'#C2693A');
  label('1780',-0.4,-0.05,D/2,G.dims,'#C2693A');
  label('700 consola',W+0.25,FLOOR+0.05,-0.35,G.dims,'#C2693A');
  label('+2200',-0.45,FLOOR,0,G.dims,'#C2693A');

  // === layer panel ===
  const layers=[
    {n:'Stalpi',c:'#B98A55',g:'posts'},
    {n:'Grinzi',c:'#9C6A3F',g:'beams'},
    {n:'Joiste',c:'#D2A875',g:'joists'},
    {n:'Podea',c:'#E0CDA6',g:'deck'},
    {n:'Contravantuiri',c:'#A8623A',g:'braces'},
    {n:'Intariri',c:'#6f6f6f',g:'fix'},
    {n:'Balustrada + poarta',c:'#CBA372',g:'rail'},
    {n:'Copac + masa',c:'#7A5A3C',g:'tree'},
    {n:'Sol + ancore',c:'#C7C0B2',g:'ground'},
    {n:'Etichete',c:'#938D80',g:'labels'},
    {n:'Cote',c:'#C2693A',g:'dims',off:true},
  ];
  const list=document.getElementById('layerList');
  layers.forEach(L=>{
    G[L.g].visible=!L.off;
    const lab=document.createElement('label');
    lab.innerHTML='<input type="checkbox" '+(L.off?'':'checked')+'><span class="sw" style="background:'+L.c+'"></span>'+L.n;
    lab.querySelector('input').addEventListener('change',e=>{G[L.g].visible=e.target.checked;});
    list.appendChild(lab);
  });

  // === orbit controls ===
  const target=new THREE.Vector3(W/2,1.35,jCz);
  let az=0.8,pol=1.05,dist=6.8;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function update(){pol=clamp(pol,0.18,1.52);dist=clamp(dist,3,16);
    camera.position.set(target.x+dist*Math.sin(pol)*Math.sin(az),target.y+dist*Math.cos(pol),target.z+dist*Math.sin(pol)*Math.cos(az));
    camera.lookAt(target);}
  let drag=false,px=0,py=0;
  cv.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;cv.setPointerCapture(e.pointerId);});
  cv.addEventListener('pointerup',()=>drag=false);
  cv.addEventListener('pointermove',e=>{if(!drag)return;az-=(e.clientX-px)*0.006;pol-=(e.clientY-py)*0.006;px=e.clientX;py=e.clientY;update();});
  cv.addEventListener('wheel',e=>{e.preventDefault();dist*=(1+e.deltaY*0.0012);update();},{passive:false});
  let pinch=0;
  cv.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dd=Math.hypot(dx,dy);if(pinch){dist*=(1+(pinch-dd)*0.004);update();}pinch=dd;e.preventDefault();}},{passive:false});
  cv.addEventListener('touchend',()=>pinch=0);
  const views={'3d':[0.8,1.05,6.8],'fata':[Math.PI,1.28,6.2],'lat':[Math.PI/2,1.22,6.6],'sus':[0.8,0.2,7.8]};
  document.querySelectorAll('.btn[data-v]').forEach(b=>b.addEventListener('click',()=>{const v=views[b.dataset.v];az=v[0];pol=v[1];dist=v[2];update();}));
  document.getElementById('reset').addEventListener('click',()=>{az=0.8;pol=1.05;dist=6.8;update();});

  function resize(){const w=stage.clientWidth,h=stage.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
  window.addEventListener('resize',resize); resize(); update();
  (function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();
})();
</script>
</body>
</html>
